server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: smart-trade-backend
  profiles:
    # 加上 local 是为了让 application-local.yml（已 gitignore）里的 api-key 生效
    active: dev,local
  
  # 数据源配置 (请在本地MySQL创建smart_trade数据库)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/smart_trade?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456 # 根据本地环境修改
    
  # Redis 缓存配置 (保存Token与行情缓存)
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 10000ms

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: com.smarttrade.entity
  global-config:
    db-config:
      # 全局逻辑删除字段(如有)
      # logic-delete-field: deleted
      # logic-delete-value: 1
      # logic-not-delete-value: 0
      # id类型：ASSIGN_ID (雪花算法)
      id-type: auto
  configuration:
    # 开启驼峰命名
    map-underscore-to-camel-case: true
    # 打印 SQL 方便排查
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 密钥配置 (需至少256位长)
jwt:
  secret: a8f0a3g9k1m2n3p4q5r6s7t8u9v0w1x2y3z4A5B6C7D8E9F0G1H2I3J4K5L6M7N8O9P
  expiration: 86400000 # 24小时

# Knife4j API 文档基础信息
knife4j:
  enable: true
  setting:
    language: zh_cn

# SmartTrade 业务参数
smarttrade:
  # 股票池大小（启动时若 zidatrade_stock_info 为空，自动从东方财富拉取这么多支）
  stock-pool-size: 100
  # AI Chat（通义千问 / DashScope - OpenAI 兼容模式）
  ai:
    chat:
      enabled: true
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:} # 通过环境变量提供，仓库不存明文
      model: qwen3.5-122b-a10b
      timeout-seconds: 60
      max-history: 20         # 拼上下文时最多带这么多轮历史，避免 token 爆炸
      system-prompt: |
        你是 SmartTrade 平台的智能投资助手，名字叫"小智"。
        你能回答 A 股相关问题，包括：股票基本面、技术指标、交易常识、风险提示等。
        回答时请用中文，简洁清楚，必要时使用要点列表。
        当涉及具体投资建议时，请提示"以上仅为信息参考，不构成投资建议"。
  # 日线行情同步参数
  daily-price:
    # 每只股票同步的最近 K 线根数
    sync-limit: 250
    # 应用启动时，若 zidatrade_stock_daily_price 为空则自动跑一次同步
    cold-start: true
    # 单只股票之间的请求间隔(毫秒)，避免给数据源造成压力
    request-interval-ms: 120
    # 每个交易日 16:30 收盘后同步（cron 6 位：秒 分 时 日 月 周）
    cron: "0 30 16 * * MON-FRI"